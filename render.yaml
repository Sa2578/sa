services:
  - type: web
    name: outbound-crm-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    preDeployCommand: npx prisma migrate deploy
    dockerCommand: node scripts/start-role.mjs
    envVars:
      - key: APP_ROLE
        value: web
      - key: DATABASE_URL
        fromDatabase:
          name: outbound-crm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: outbound-crm-redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: WEBHOOK_SECRET
        generateValue: true

  - type: worker
    name: outbound-crm-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: frankfurt
    dockerCommand: node scripts/start-role.mjs
    envVars:
      - key: APP_ROLE
        value: worker
      - key: DATABASE_URL
        fromDatabase:
          name: outbound-crm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: outbound-crm-redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        fromService:
          type: web
          name: outbound-crm-web
          envVarKey: NEXTAUTH_SECRET
      - key: WEBHOOK_SECRET
        fromService:
          type: web
          name: outbound-crm-web
          envVarKey: WEBHOOK_SECRET
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: outbound-crm-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: keyvalue
    name: outbound-crm-redis
    region: frankfurt
    plan: starter
    ipAllowList: []

databases:
  - name: outbound-crm-db
    region: frankfurt
    plan: basic-256mb
    databaseName: outbound_crm
    ipAllowList: []
